<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Connexion | AD TRANS LOGISTICS</title>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --black:#0A0A0A;--dark:#171717;--gray800:#262626;--gray600:#525252;
            --gray500:#737373;--gray400:#A3A3A3;--gray300:#D4D4D4;
            --gray200:#E5E5E5;--gray100:#F0F0F0;--gray50:#F7F7F7;--white:#FFFFFF;
        }
        *{box-sizing:border-box;margin:0;padding:0;}
        html{scroll-behavior:smooth;overflow-x:hidden;}
        body{font-family:'Instrument Sans',sans-serif;background:var(--gray50);color:var(--black);min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden;}
        h1,h2,h3{font-family:'Space Grotesk',sans-serif;}
        .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 24px;border-radius:9999px;font-weight:600;font-size:15px;font-family:'Instrument Sans',sans-serif;transition:all .25s;cursor:pointer;text-decoration:none;border:none;outline:none;width:100%;}
        .btn-dark{background:var(--black);color:var(--white);}
        .btn-dark:hover{background:var(--gray800);}
        .btn-dark:disabled{background:var(--gray400);cursor:not-allowed;}
        .fi{width:100%;background:var(--white);border:1px solid var(--gray200);border-radius:10px;color:var(--black);font-size:14px;padding:12px 14px;transition:all .3s;outline:none;font-family:'Instrument Sans',sans-serif;}
        .fi:focus{border-color:var(--black);box-shadow:0 0 0 3px rgba(10,10,10,.06);}
        .fi::placeholder{color:var(--gray400);}
        .pwd-wrap{position:relative;}
        .pwd-wrap .fi{padding-right:44px;}
        .pwd-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--gray400);padding:4px;display:flex;align-items:center;transition:color .2s;}
        .pwd-toggle:hover{color:var(--black);}
        label{font-size:13px;font-weight:600;color:var(--gray600);display:block;margin-bottom:6px;}
        .field{margin-bottom:14px;}
        .msg{font-size:13px;border-radius:10px;padding:11px 14px;margin-bottom:16px;display:none;}
        .msg-err{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;}
        .msg-ok{background:#f0fdf4;border:1px solid #bbf7d0;color:#16a34a;}
        .topnav{background:rgba(255,255,255,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--gray200);padding:0 24px;}
        .topnav-inner{max-width:1440px;margin:0 auto;display:flex;align-items:center;height:64px;}
        main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 16px;}
        .card{background:#fff;border:1px solid var(--gray200);border-radius:24px;padding:40px;width:100%;max-width:460px;box-shadow:0 4px 40px rgba(0,0,0,.06);}
        .tab-bar{display:flex;background:var(--gray100);border-radius:12px;padding:4px;margin-bottom:28px;}
        .tab-btn{flex:1;padding:10px;border-radius:9px;border:none;background:transparent;font-size:14px;font-weight:600;cursor:pointer;font-family:'Instrument Sans',sans-serif;color:var(--gray500);transition:all .2s;}
        .tab-btn.active{background:#fff;color:var(--black);box-shadow:0 2px 8px rgba(0,0,0,.08);}
        .tab-pane{display:none;}
        .tab-pane.active{display:block;}
        .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
        @keyframes spin{to{transform:rotate(360deg);}}
        .spin{width:17px;height:17px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
        @media(max-width:480px){.grid2{grid-template-columns:1fr;}.card{padding:28px 20px;}}
    </style>
    <!-- PWA / Application Mobile -->
    <link rel="manifest" href="/manifest.json"/>
    <meta name="theme-color" content="#0A0A0A"/>
    <meta name="mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
    <meta name="apple-mobile-web-app-title" content="AD TRANS"/>

.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:6px 4px;font-size:10px;font-weight:600;color:#A3A3A3;text-decoration:none;transition:color .2s;font-family:'Instrument Sans',sans-serif;letter-spacing:.01em;}
.bn-item:hover,.bn-item.active{color:#0A0A0A;}
.bn-item svg{stroke:currentColor;}
@media(max-width:1023px){#bottomnav{display:flex;}body{padding-bottom:62px;}.whatsapp-btn{bottom:calc(1rem + 68px)!important;}}

<main>
<div class="card">
    <!-- Header -->
    <div style="text-align:center;margin-bottom:28px;">
        <div style="width:52px;height:52px;border-radius:14px;background:var(--black);display:inline-flex;align-items:center;justify-content:center;color:#fff;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:14px;margin-bottom:14px;">AD</div>
        <h1 style="font-size:22px;margin-bottom:6px;">Espace Client</h1>
        <p style="font-size:14px;color:var(--gray500);">Gérez vos dossiers de dédouanement en ligne</p>
    </div>

    <!-- Tabs -->
    <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('login')">Se connecter</button>
        <button class="tab-btn" onclick="switchTab('register')">Créer un compte</button>
    </div>

    <!-- Messages -->
    <div id="msg-err" class="msg msg-err"></div>
    <div id="msg-ok"  class="msg msg-ok"></div>

    <!-- Login -->
    <div id="tab-login" class="tab-pane active">
        <form onsubmit="doLogin(event)">
            <div class="field">
                <label for="l-email">Adresse email</label>
                <input id="l-email" type="email" class="fi" placeholder="votre@email.com" required/>
            </div>
            <div class="field" style="margin-bottom:20px;">
                <label for="l-pwd">Mot de passe</label>
                <div class="pwd-wrap">
                    <input id="l-pwd" type="password" class="fi" placeholder="••••••••" required/>
                    <button type="button" class="pwd-toggle" onclick="togglePwd(this)" aria-label="Afficher le mot de passe">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
            </div>
            <button type="submit" id="btn-login" class="btn btn-dark">Se connecter</button>
        </form>
    </div>

    <!-- Register -->
    <div id="tab-register" class="tab-pane">
        <form onsubmit="doRegister(event)">
            <div class="grid2">
                <div class="field">
                    <label for="r-name">Nom complet *</label>
                    <input id="r-name" type="text" class="fi" placeholder="Jean Dupont" required/>
                </div>
                <div class="field">
                    <label for="r-phone">Téléphone</label>
                    <input id="r-phone" type="tel" class="fi" placeholder="+229 01 XX XX XX"/>
                </div>
            </div>
            <div class="field">
                <label for="r-company">Société / Entreprise</label>
                <input id="r-company" type="text" class="fi" placeholder="Nom de votre société (optionnel)"/>
            </div>
            <div class="field">
                <label for="r-email">Adresse email *</label>
                <input id="r-email" type="email" class="fi" placeholder="votre@email.com" required/>
            </div>
            <div class="grid2">
                <div class="field">
                    <label for="r-pwd">Mot de passe *</label>
                    <div class="pwd-wrap">
                        <input id="r-pwd" type="password" class="fi" placeholder="Min. 6 caractères" required minlength="6"/>
                        <button type="button" class="pwd-toggle" onclick="togglePwd(this)" aria-label="Afficher le mot de passe">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                </div>
                <div class="field" style="margin-bottom:20px;">
                    <label for="r-confirm">Confirmer *</label>
                    <div class="pwd-wrap">
                        <input id="r-confirm" type="password" class="fi" placeholder="••••••••" required/>
                        <button type="button" class="pwd-toggle" onclick="togglePwd(this)" aria-label="Afficher le mot de passe">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
// ══════════════════════════════════════════════
//   CONFIGURATION centralisee (voir /config.js)
// ══════════════════════════════════════════════
const { SUPABASE_URL: SB_URL, SUPABASE_ANON_KEY: SB_KEY, ADMIN_EMAIL: ADMIN } = window.ADTL_CONFIG;
// ══════════════════════════════════════════════

const sb = supabase.createClient(SB_URL, SB_KEY);

// Déjà connecté ?
sb.auth.getSession().then(({data:{session}}) => {
    if (session) redirect(session.user.email);
});

function redirect(email) {
    window.location.href = email === ADMIN ? '/admin' : '/espace-client';
}
function showErr(m) {
    const e=document.getElementById('msg-err'); e.textContent=m; e.style.display='block';
    document.getElementById('msg-ok').style.display='none';
}
function showOk(m) {
    const e=document.getElementById('msg-ok'); e.textContent=m; e.style.display='block';
    document.getElementById('msg-err').style.display='none';
}
function clearMsg() {
    document.getElementById('msg-err').style.display='none';
    document.getElementById('msg-ok').style.display='none';
}
function setLoading(id, on, label) {
    const b=document.getElementById(id);
    b.disabled=on;
    b.innerHTML=on?'<span class="spin"></span> Chargement…':label;
}
function switchTab(t) {
    ['login','register'].forEach((k,i) => {
        document.querySelectorAll('.tab-btn')[i].classList.toggle('active', k===t);
        document.getElementById('tab-'+k).classList.toggle('active', k===t);
    });
    clearMsg();
}

async function doLogin(e) {
    e.preventDefault(); clearMsg();
    const email=document.getElementById('l-email').value.trim();
    const pwd  =document.getElementById('l-pwd').value;
    setLoading('btn-login',true,'Se connecter');
    const {error}=await sb.auth.signInWithPassword({email,password:pwd});
    setLoading('btn-login',false,'Se connecter');
    if (error) {
        if (error.message.includes('Email not confirmed')) {
            showErr('Votre email n\'est pas encore confirmé. Vérifiez votre boîte de réception (et les spams).');
        } else if (error.message.includes('Invalid login')) {
            showErr('Email ou mot de passe incorrect. Vérifiez vos identifiants.');
        } else {
            showErr(error.message);
        }
        return;
    }
    redirect(email);
}

async function doRegister(e) {
    e.preventDefault(); clearMsg();
    const name   =document.getElementById('r-name').value.trim();
    const phone  =document.getElementById('r-phone').value.trim();
    const company=document.getElementById('r-company').value.trim();
    const email  =document.getElementById('r-email').value.trim();
    const pwd    =document.getElementById('r-pwd').value;
    const confirm=document.getElementById('r-confirm').value;
    if (pwd!==confirm) { showErr('Les mots de passe ne correspondent pas.'); return; }
    setLoading('btn-reg',true,'Créer mon compte');
    const {data, error}=await sb.auth.signUp({
        email, password:pwd,
        options:{data:{full_name:name,phone,company}}
    });
    setLoading('btn-reg',false,'Créer mon compte');
    if (error) {
        if (error.message.includes('already registered') || error.message.includes('already been registered')) {
            showErr('Un compte existe déjà avec cet email. Essayez de vous connecter.');
        } else if (error.message.includes('rate limit') || error.message.includes('too many')) {
            showErr('Trop de tentatives. Veuillez réessayer dans quelques minutes.');
        } else {
            showErr('Erreur : ' + error.message);
        }
        return;
    }
    // Check if user was auto-confirmed or needs email confirmation
    if (data?.user?.email_confirmed_at) {
        showOk('Compte créé avec succès ! Connexion en cours…');
        // Auto-login
        const {error: loginErr} = await sb.auth.signInWithPassword({email, password: pwd});
        if (!loginErr) { redirect(email); return; }
    }
    showOk('Compte créé ! Vous pouvez maintenant vous connecter.');
    switchTab('login');
    document.getElementById('l-email').value=email;
}

function togglePwd(btn) {
    const input = btn.parentElement.querySelector('input');
    const isHidden = input.type === 'password';
    input.type = isHidden ? 'text' : 'password';
    btn.innerHTML = isHidden
        ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
        : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
}
</script>
